<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CS2 Collection</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


<div class="header">

<div>
<h2 id="username">
Игрок
</h2>

<p>
CS2 Collection
</p>

</div>


<div class="avatar">
★
</div>

</div>



<div class="box profile">

<h3>
⭐ Баланс:
<span id="balance">
1000
</span>
</h3>


<p>
Уровень:
<span id="level">
1
</span>
</p>


<p>
Опыт:
<span id="xp">
0
</span>
/100
</p>


</div>





<div class="menu">


<button onclick="showCases()">
📦 Кейсы
</button>


<button onclick="showInventory()">
🎒 Инвентарь
</button>


<button onclick="showUpgrade()">
⬆️ Upgrader
</button>


<button onclick="showContract()">
🔄 Контракт
</button>


<button onclick="showShop()">
🛒 Магазин
</button>


<button onclick="showCollections()">
🏆 Коллекции
</button>


</div>





<div id="content" class="box">


<h2>
CS2 Collection
</h2>


<p>
Собирай коллекцию скинов
</p>


</div>



</div>




<script src="app.js"></script>


</body>

</html>
